version: "3.8"

services:
  detection-engine:
    build: .
    runtime: nvidia          # enables GPU passthrough
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ./models:/app/models  # mount models so you don't bake them into image
    devices:
      - /dev/video0:/dev/video0  # webcam passthrough
    ports:
      - "8000:8000"   # MJPEG stream
      - "8001:8001"   # WebRTC
